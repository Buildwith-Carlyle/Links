<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>You're Going To Ask Anyway, Here It Is</title>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  :root {
    --bg:       #EBE9E1;
    --orange:   #E43D12;
    --rose:     #D6536D;
    --pink:     #FFA2B6;
    --yellow:   #EFB11D;
    --dark:     #1C1A17;
    --surface:  #FFFFFF;
    --muted:    #7A7060;
    --hint:     #B0A898;
    --border:   rgba(0,0,0,0.08);
    --font:     -apple-system, BlinkMacSystemFont, 'SF Pro Display', 'SF Pro Text', 'Helvetica Neue', Helvetica, Arial, sans-serif;
  }

  html { scroll-behavior: smooth; }
  body {
    background: var(--bg);
    font-family: var(--font);
    color: var(--dark);
    min-height: 100vh;
    -webkit-font-smoothing: antialiased;
    -moz-osx-font-smoothing: grayscale;
    padding-bottom: 4rem;
  }

  /* ── HERO ── */
  .hero {
    background: var(--dark);
    padding: 3.5rem 1.5rem 2.5rem;
    text-align: center;
    position: relative;
    overflow: hidden;
    border-bottom: none;
  }
  .hero-glow {
    position: absolute;
    width: 400px; height: 220px;
    border-radius: 50%;
    background: var(--orange);
    opacity: 0.2;
    top: -80px; left: 50%;
    transform: translateX(-50%);
    pointer-events: none;
    filter: blur(50px);
  }
  .hero-eyebrow {
    font-size: 11px; font-weight: 600;
    letter-spacing: 0.14em; text-transform: uppercase;
    color: var(--yellow); margin-bottom: 14px; position: relative;
  }
  .hero-title {
    font-size: clamp(1.8rem, 6vw, 2.8rem);
    font-weight: 700; color: #F5F0E8;
    line-height: 1.12; max-width: 380px;
    margin: 0 auto 12px;
    letter-spacing: -0.03em; position: relative;
  }
  .hero-title em {
    font-style: italic; font-weight: 300;
    color: var(--pink); letter-spacing: -0.01em;
  }
  .hero-sub {
    font-size: 13px; color: #7A7060;
    max-width: 280px; margin: 0 auto 14px;
    line-height: 1.6; font-weight: 400; position: relative;
  }
  .hero-ig {
    display: inline-flex; align-items: center; gap: 6px; position: relative;
  }
  .hero-ig a {
    font-size: 12px; font-weight: 600; letter-spacing: 0.02em;
    color: var(--yellow); text-decoration: none;
    border-bottom: 1px solid rgba(239,177,29,0.35); padding-bottom: 1px;
    transition: border-color 0.2s;
  }
  .hero-ig a:hover { border-color: var(--yellow); }
  .hero-ig-dot { width: 4px; height: 4px; border-radius: 50%; background: var(--yellow); opacity: 0.5; }
  .hero-divider { width: 40px; height: 1px; background: var(--orange); opacity: 0.4; margin: 16px auto 0; }

  /* ── CONTAINER ── */
  .container { max-width: 560px; margin: 0 auto; padding: 0 1rem; }

  /* ── SEARCH ── */
  .search-wrap { padding: 1.25rem 0 0.25rem; animation: fadeUp 0.4s ease both; }
  .search-inner { position: relative; }
  .search-icon { position: absolute; left: 14px; top: 50%; transform: translateY(-50%); color: var(--hint); pointer-events: none; }
  .search-input {
    width: 100%; padding: 12px 16px 12px 42px;
    font-family: var(--font); font-size: 15px; font-weight: 400;
    border: 1.5px solid var(--border); border-radius: 14px;
    background: var(--surface); color: var(--dark); outline: none;
    transition: border-color 0.2s, box-shadow 0.2s;
    -webkit-appearance: none;
  }
  .search-input::placeholder { color: var(--hint); }
  .search-input:focus { border-color: var(--orange); box-shadow: 0 0 0 3px rgba(228,61,18,0.1); }

  /* ── SECTION LABEL ── */
  .section-label {
    font-size: 11px; font-weight: 600; letter-spacing: 0.08em;
    text-transform: uppercase; color: var(--muted);
    padding: 1.25rem 0 0.75rem; animation: fadeUp 0.4s 0.05s ease both;
  }

  /* ── CATEGORY GRID ── */
  .cat-grid {
    display: grid; grid-template-columns: 1fr 1fr;
    gap: 10px; margin-bottom: 1.5rem;
    animation: fadeUp 0.4s 0.1s ease both;
  }

  .cat-card {
    border-radius: 20px; padding: 1.3rem 1.1rem 1.1rem;
    cursor: pointer; display: flex; flex-direction: column; gap: 6px;
    border: none; transition: transform 0.2s ease, box-shadow 0.2s ease;
    -webkit-tap-highlight-color: transparent; user-select: none;
    position: relative; overflow: hidden;
  }
  .cat-card:hover { transform: translateY(-3px); box-shadow: 0 12px 32px rgba(0,0,0,0.15); }
  .cat-card:active { transform: scale(0.97); }

  /* Card colour variants */
  .card-orange { background: var(--orange); }
  .card-rose   { background: var(--rose);   }
  .card-pink   { background: var(--pink);   }
  .card-yellow { background: var(--yellow); }

  .cat-icon { font-size: 26px; line-height: 1; margin-bottom: 4px; }

  .cat-name { font-size: 15px; font-weight: 700; line-height: 1.2; letter-spacing: -0.02em; }
  .card-orange .cat-name,
  .card-rose   .cat-name { color: #fff; }
  .card-pink   .cat-name { color: #5A1A2A; }
  .card-yellow .cat-name { color: #3A2800; }

  .cat-desc { font-size: 11px; line-height: 1.4; font-weight: 400; }
  .card-orange .cat-desc,
  .card-rose   .cat-desc { color: rgba(255,255,255,0.7); }
  .card-pink   .cat-desc { color: rgba(90,26,42,0.65); }
  .card-yellow .cat-desc { color: rgba(58,40,0,0.65); }

  .cat-footer { margin-top: auto; padding-top: 10px; display: flex; align-items: center; justify-content: space-between; }

  .cat-count { font-size: 11px; font-weight: 600; }
  .card-orange .cat-count,
  .card-rose   .cat-count { color: rgba(255,255,255,0.85); }
  .card-pink   .cat-count { color: rgba(90,26,42,0.7); }
  .card-yellow .cat-count { color: rgba(58,40,0,0.7); }

  .cat-arrow {
    width: 26px; height: 26px; border-radius: 50%;
    display: flex; align-items: center; justify-content: center; font-size: 15px;
  }
  .card-orange .cat-arrow { background: rgba(255,255,255,0.2); color: #fff; }
  .card-rose   .cat-arrow { background: rgba(255,255,255,0.2); color: #fff; }
  .card-pink   .cat-arrow { background: rgba(90,26,42,0.12);   color: #5A1A2A; }
  .card-yellow .cat-arrow { background: rgba(58,40,0,0.12);    color: #3A2800; }

  .cat-badge {
    font-size: 9px; font-weight: 700; letter-spacing: 0.06em;
    text-transform: uppercase; padding: 3px 8px; border-radius: 999px;
  }
  .card-yellow .cat-badge { background: rgba(58,40,0,0.1); color: rgba(58,40,0,0.5); }

  /* ── SEARCH RESULTS ── */
  .results-section { display: none; margin-bottom: 1.5rem; animation: fadeUp 0.3s ease both; }
  .results-section.show { display: block; }
  .results-label { font-size: 11px; font-weight: 600; letter-spacing: 0.06em; text-transform: uppercase; color: var(--muted); margin-bottom: 10px; }

  .result-item {
    background: var(--surface); border-radius: 14px;
    padding: 13px 15px; margin-bottom: 8px;
    display: flex; align-items: center; gap: 12px;
    text-decoration: none; border: 1.5px solid var(--border);
    transition: border-color 0.15s, transform 0.15s;
  }
  .result-item:hover { border-color: var(--orange); transform: scale(1.01); }
  .result-dot { width: 9px; height: 9px; border-radius: 50%; flex-shrink: 0; background: var(--orange); }
  .result-info { flex: 1; min-width: 0; }
  .result-name { font-size: 14px; font-weight: 600; color: var(--dark); margin-bottom: 2px; letter-spacing: -0.01em; }
  .result-cat  { font-size: 11px; color: var(--muted); }
  .result-link {
    font-size: 11px; font-weight: 700; letter-spacing: 0.01em;
    color: #fff; background: var(--orange);
    padding: 6px 14px; border-radius: 999px;
    white-space: nowrap; flex-shrink: 0;
    transition: opacity 0.15s; text-decoration: none;
  }
  .result-link:hover { opacity: 0.85; }
  .no-results { text-align: center; padding: 2rem; color: var(--muted); font-size: 14px; }

  /* ── PANEL ── */
  .panel-backdrop {
    display: none; position: fixed; inset: 0;
    background: rgba(28,26,23,0.5); z-index: 10;
    backdrop-filter: blur(8px); -webkit-backdrop-filter: blur(8px);
  }
  .panel-backdrop.open { display: block; animation: fadeIn 0.2s ease; }

  .panel {
    position: fixed; bottom: 0; left: 0; right: 0;
    background: var(--bg);
    border-radius: 24px 24px 0 0;
    border-top: 2px solid var(--orange);
    z-index: 20; max-height: 85vh; overflow-y: auto;
    transform: translateY(100%);
    transition: transform 0.4s cubic-bezier(0.32, 0.72, 0, 1);
    overscroll-behavior: contain;
  }
  .panel.open { transform: translateY(0); }

  .panel-handle { width: 36px; height: 4px; background: var(--hint); border-radius: 2px; margin: 12px auto 0; opacity: 0.5; }

  .panel-header {
    padding: 1rem 1.25rem 0.875rem;
    border-bottom: 1px solid var(--border);
    display: flex; align-items: center; gap: 10px;
    position: sticky; top: 0; background: var(--bg); z-index: 1;
  }
  .panel-color-dot { width: 12px; height: 12px; border-radius: 50%; flex-shrink: 0; }
  .panel-title { font-size: 17px; font-weight: 700; color: var(--dark); letter-spacing: -0.02em; }
  .panel-count { font-size: 12px; color: var(--muted); margin-left: 2px; font-weight: 400; }
  .panel-close {
    margin-left: auto; width: 28px; height: 28px; border-radius: 50%;
    background: rgba(0,0,0,0.06); border: none; cursor: pointer;
    display: flex; align-items: center; justify-content: center;
    color: var(--muted); font-size: 13px; flex-shrink: 0; transition: background 0.15s;
  }
  .panel-close:hover { background: rgba(0,0,0,0.12); }

  .panel-search-wrap { padding: 10px 1.25rem; border-bottom: 1px solid var(--border); }
  .panel-search-inner { position: relative; }
  .panel-search-icon { position: absolute; left: 12px; top: 50%; transform: translateY(-50%); color: var(--hint); pointer-events: none; }
  .panel-search {
    width: 100%; padding: 9px 14px 9px 36px;
    font-family: var(--font); font-size: 14px;
    border: 1.5px solid var(--border); border-radius: 10px;
    background: var(--surface); color: var(--dark); outline: none;
    -webkit-appearance: none; transition: border-color 0.2s;
  }
  .panel-search::placeholder { color: var(--hint); }
  .panel-search:focus { border-color: var(--orange); }

  .panel-body { padding: 0.25rem 0 2rem; }

  /* PRODUCT ITEMS */
  .product-item {
    display: flex; align-items: center; gap: 12px;
    padding: 13px 1.25rem; border-bottom: 1px solid var(--border);
    transition: background 0.15s;
  }
  .product-item:last-child { border-bottom: none; }
  .product-item:hover { background: rgba(228,61,18,0.03); }

  .product-num { font-size: 11px; color: var(--hint); min-width: 20px; font-weight: 600; text-align: center; }
  .product-info { flex: 1; min-width: 0; }
  .product-name { font-size: 15px; font-weight: 600; color: var(--dark); margin-bottom: 3px; letter-spacing: -0.02em; }
  .product-desc { font-size: 12px; color: var(--muted); line-height: 1.4; font-weight: 400; }

  .product-link {
    font-size: 12px; font-weight: 700; letter-spacing: 0.01em;
    color: #fff; text-decoration: none;
    background: var(--orange); padding: 7px 15px;
    border-radius: 999px; white-space: nowrap; flex-shrink: 0;
    transition: opacity 0.15s;
  }
  .product-link:hover { opacity: 0.85; }
  .product-link.disabled {
    background: rgba(0,0,0,0.06); color: var(--hint); pointer-events: none;
  }

  .empty-msg { text-align: center; padding: 3rem 1rem; color: var(--muted); font-size: 14px; line-height: 1.7; }
  .empty-msg span { display: block; font-size: 2.5rem; margin-bottom: 0.75rem; }

  /* ── FOOTER ── */
  .footer {
    text-align: center; padding: 0 0 1rem;
    font-size: 12px; color: var(--hint);
    animation: fadeUp 0.4s 0.3s ease both;
  }
  .footer a { color: var(--orange); text-decoration: none; font-weight: 600; }
  .footer a:hover { text-decoration: underline; }

  @keyframes fadeUp { from { opacity: 0; transform: translateY(12px); } to { opacity: 1; transform: translateY(0); } }
  @keyframes fadeIn  { from { opacity: 0; } to { opacity: 1; } }
  @media (max-width: 340px) { .cat-grid { grid-template-columns: 1fr; } }
</style>
</head>
<body>

<script>
  // =====================================================
  // TO ADD PRODUCTS: just tell Claude — I'll update
  // this file and you re-upload to GitHub. Done! ✅
  // =====================================================
  const PRODUCTS = [

    // DESK SETUP
    { name: 'Monitor',        category: 'Desk Setup', desc: 'Add your monitor model and why you love it.', link: '#' },
    { name: 'Desk Lamp',      category: 'Desk Setup', desc: 'Add your lighting setup here.',               link: '#' },
    { name: 'Keyboard',       category: 'Desk Setup', desc: 'Add your keyboard here.',                     link: '#' },
    { name: 'Mouse',          category: 'Desk Setup', desc: 'Add your mouse here.',                        link: '#' },
    { name: 'Desk',           category: 'Desk Setup', desc: 'Add your desk here.',                         link: '#' },
    { name: 'Chair',          category: 'Desk Setup', desc: 'Add your chair here.',                        link: '#' },

    // VIBE SETUP
    { name: 'Main Furniture', category: 'Vibe Setup', desc: 'Add the furniture that defines your space.',  link: '#' },
    { name: 'Wall Art',       category: 'Vibe Setup', desc: 'Add any prints or art you have up.',          link: '#' },
    { name: 'Plants',         category: 'Vibe Setup', desc: 'Add your plant picks here.',                  link: '#' },
    { name: 'Candles',        category: 'Vibe Setup', desc: 'Add your favourite candles or diffuser.',     link: '#' },

    // 3D PLUGINS & SOFTWARE
    { name: 'Rhino 3D',       category: '3D Plugins & Software', desc: 'Industry-standard NURBS modelling — essential for architecture.',             link: 'https://www.rhino3d.com' },
    { name: 'Grasshopper',    category: '3D Plugins & Software', desc: 'Visual programming for parametric and algorithmic design inside Rhino.',      link: 'https://www.grasshopper3d.com' },
    { name: 'SketchUp Pro',   category: '3D Plugins & Software', desc: 'Fast and intuitive 3D modelling, great for concept and presentation models.', link: 'https://www.sketchup.com' },
    { name: 'Revit',          category: '3D Plugins & Software', desc: 'BIM platform for professional architectural design and documentation.',       link: 'https://www.autodesk.com/products/revit' },

    // TEMPLATES — uncomment when ready:
    // { name: 'Floor Plan Template', category: 'Templates', desc: 'Ready to use floor plan layout.', link: '#' },
  ];

  const CATEGORIES = [
    { key: 'Desk Setup',            icon: '🖥️', cls: 'card-orange', dot: '#E43D12', desc: 'Monitors, lighting & accessories'  },
    { key: 'Vibe Setup',            icon: '🎨', cls: 'card-rose',   dot: '#D6536D', desc: 'Furniture, décor & atmosphere'      },
    { key: '3D Plugins & Software', icon: '🧩', cls: 'card-pink',   dot: '#FFA2B6', desc: 'Architecture software & tools'      },
    { key: 'Templates',             icon: '📐', cls: 'card-yellow', dot: '#EFB11D', desc: 'Downloadable arch templates'        },
  ];

  let activePanel = null;

  function handleSearch(q) {
    const query = q.trim().toLowerCase();
    const catSection = document.getElementById('cat-section');
    const resultsSection = document.getElementById('results-section');
    if (!query) { catSection.style.display = ''; resultsSection.classList.remove('show'); return; }
    catSection.style.display = 'none';
    resultsSection.classList.add('show');
    const matches = PRODUCTS.filter(p =>
      p.name.toLowerCase().includes(query) ||
      p.desc.toLowerCase().includes(query) ||
      p.category.toLowerCase().includes(query)
    );
    if (!matches.length) {
      resultsSection.innerHTML = `<div class="no-results">No results for "<strong>${q}</strong>"</div>`;
      return;
    }
    resultsSection.innerHTML =
      `<div class="results-label">${matches.length} result${matches.length !== 1 ? 's' : ''}</div>` +
      matches.map(p => {
        const c = CATEGORIES.find(x => x.key === p.category);
        return `<a class="result-item" href="${p.link === '#' ? 'javascript:void(0)' : p.link}" ${p.link !== '#' ? 'target="_blank" rel="noopener"' : ''}>
          <div class="result-dot" style="background:${c?.dot}"></div>
          <div class="result-info">
            <div class="result-name">${p.name}</div>
            <div class="result-cat">${c?.icon} ${p.category}</div>
          </div>
          <span class="result-link">${p.link === '#' ? 'Soon' : 'View →'}</span>
        </a>`;
      }).join('');
  }

  function openPanel(key) {
    activePanel = key;
    const cat = CATEGORIES.find(c => c.key === key);
    document.getElementById('panel-dot').style.background = cat.dot;
    document.getElementById('panel-title').textContent = cat.key;
    document.getElementById('panel-search').value = '';
    renderPanelProducts('');
    document.getElementById('backdrop').classList.add('open');
    document.getElementById('panel').classList.add('open');
    document.body.style.overflow = 'hidden';
  }

  function renderPanelProducts(query) {
    let products = PRODUCTS.filter(p => p.category === activePanel);
    if (query) products = products.filter(p =>
      p.name.toLowerCase().includes(query) ||
      p.desc.toLowerCase().includes(query)
    );
    document.getElementById('panel-count').textContent = products.length ? `${products.length} items` : '';
    const body = document.getElementById('panel-body');
    if (!PRODUCTS.filter(p => p.category === activePanel).length) {
      body.innerHTML = `<div class="empty-msg"><span>${activePanel === 'Templates' ? '🚧' : '📭'}</span>${
        activePanel === 'Templates'
          ? 'Templates coming soon — follow <a href="https://instagram.com/carlyle_dsa" style="color:var(--orange)" target="_blank">@carlyle_dsa</a> to be notified!'
          : 'Nothing here yet — check back soon!'
      }</div>`;
    } else if (!products.length) {
      body.innerHTML = `<div class="empty-msg"><span>🔍</span>No matches found.</div>`;
    } else {
      body.innerHTML = products.map((p, i) => `
        <div class="product-item">
          <span class="product-num">${String(i + 1).padStart(2, '0')}</span>
          <div class="product-info">
            <div class="product-name">${p.name}</div>
            <div class="product-desc">${p.desc}</div>
          </div>
          <a class="product-link ${p.link === '#' ? 'disabled' : ''}" href="${p.link}" ${p.link !== '#' ? 'target="_blank" rel="noopener"' : ''}>
            ${p.link === '#' ? 'Soon' : 'View →'}
          </a>
        </div>`).join('');
    }
  }

  function closePanel() {
    document.getElementById('backdrop').classList.remove('open');
    document.getElementById('panel').classList.remove('open');
    document.body.style.overflow = '';
    activePanel = null;
  }

  document.addEventListener('keydown', e => { if (e.key === 'Escape') closePanel(); });

  window.addEventListener('DOMContentLoaded', () => {
    const grid = document.getElementById('cat-grid');
    grid.innerHTML = CATEGORIES.map(cat => {
      const count = PRODUCTS.filter(p => p.category === cat.key).length;
      const isTemplates = cat.key === 'Templates';
      return `
        <div class="cat-card ${cat.cls}" onclick="openPanel('${cat.key}')">
          <div class="cat-icon">${cat.icon}</div>
          <div class="cat-name">${cat.key}</div>
          <div class="cat-desc">${cat.desc}</div>
          <div class="cat-footer">
            ${isTemplates && count === 0
              ? `<span class="cat-badge">Coming soon</span>`
              : `<span class="cat-count">${count} items</span>`}
            <span class="cat-arrow">›</span>
          </div>
        </div>`;
    }).join('');

    document.getElementById('global-search').addEventListener('input', e => handleSearch(e.target.value));
    document.getElementById('panel-search').addEventListener('input', e => {
      renderPanelProducts(e.target.value.trim().toLowerCase());
    });
  });
</script>

<!-- HERO -->
<div class="hero">
  <div class="hero-glow"></div>
  <div class="hero-eyebrow">By Carlyle</div>
  <h1 class="hero-title">You're Going To Ask Anyway, <em>Here It Is</em></h1>
  <p class="hero-sub">Everything I use across my videos — all in one place.</p>
  <div class="hero-ig">
    <div class="hero-ig-dot"></div>
    <a href="https://instagram.com/carlyle_dsa" target="_blank">@carlyle_dsa</a>
    <div class="hero-ig-dot"></div>
  </div>
  <div class="hero-divider"></div>
</div>

<!-- MAIN -->
<div class="container">

  <div class="search-wrap">
    <div class="search-inner">
      <svg class="search-icon" width="15" height="15" fill="none" viewBox="0 0 24 24"><circle cx="11" cy="11" r="7" stroke="currentColor" stroke-width="1.5"/><path d="M16.5 16.5 21 21" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/></svg>
      <input id="global-search" class="search-input" type="search" placeholder="Search all products…" autocomplete="off" autocorrect="off">
    </div>
  </div>

  <div id="results-section" class="results-section"></div>

  <div id="cat-section">
    <div class="section-label">Categories</div>
    <div class="cat-grid" id="cat-grid"></div>
  </div>

  <div class="footer">
    Updated regularly &mdash; <a href="https://instagram.com/carlyle_dsa" target="_blank">@carlyle_dsa</a> on Instagram
  </div>

</div>

<!-- PANEL -->
<div class="panel-backdrop" id="backdrop" onclick="closePanel()"></div>
<div class="panel" id="panel">
  <div class="panel-handle"></div>
  <div class="panel-header">
    <div class="panel-color-dot" id="panel-dot"></div>
    <span class="panel-title" id="panel-title"></span>
    <span class="panel-count" id="panel-count"></span>
    <button class="panel-close" onclick="closePanel()">✕</button>
  </div>
  <div class="panel-search-wrap">
    <div class="panel-search-inner">
      <svg class="panel-search-icon" width="13" height="13" fill="none" viewBox="0 0 24 24"><circle cx="11" cy="11" r="7" stroke="currentColor" stroke-width="1.5"/><path d="M16.5 16.5 21 21" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/></svg>
      <input id="panel-search" class="panel-search" type="search" placeholder="Search in this category…" autocomplete="off">
    </div>
  </div>
  <div class="panel-body" id="panel-body"></div>
</div>

</body>
</html>
